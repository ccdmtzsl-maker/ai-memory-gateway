<!DOCTYPE html>

<body>
<!-- 模型预设切换按钮（右上角固定） -->
<div id="preset-switcher" style="position:fixed;top:12px;right:16px;z-index:9999;font-family:inherit;">
  <button onclick="togglePresetPanel()" id="preset-toggle-btn" style="
    padding:6px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;
    font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);
    display:flex;align-items:center;gap:6px;color:#374151;">
    <span id="preset-current-name">切换</span>
    <span style="font-size:10px;">&#9660;</span>
  </button>
  <div id="preset-panel" style="
    display:none;position:absolute;top:100%;right:0;margin-top:6px;
    background:#fff;border:1px solid #e5e7eb;border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,0.12);min-width:280px;max-width:360px;
    overflow:hidden;">
    <div id="preset-panel-list" style="max-height:300px;overflow-y:auto;padding:6px;"></div>
    <div style="border-top:1px solid #f3f4f6;padding:8px;display:flex;gap:6px;align-items:center;">
      <input type="text" id="preset-new-name" placeholder="预设名称" style="
        flex:1;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;outline:none;">
      <button onclick="addPresetFromCurrent()" style="
        padding:6px 12px;border-radius:6px;border:none;background:#4f46e5;color:#fff;
        font-size:12px;cursor:pointer;white-space:nowrap;">+ 新建</button>
    </div>
  </div>
</div>

                <!-- 分层 Tab -->
                <div class="card layer-tabs-card">
                    <div class="layer-tabs">
